<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Day: Roles in Action</title>
    <style>
        :root {
            --primary: #1a1f5e;
            --secondary: #185fa5;
            --chief-color: #6c5ce7;
            --invig-color: #00b894;
            --both-color: #fdcb6e;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .simulation-container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
        }

        /* Timeline Navigation */
        .timeline-nav {
            display: flex;
            background: #e9ecef;
            padding: 10px;
            gap: 10px;
        }

        .stage-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .stage-btn.active {
            background: var(--secondary);
            color: white;
        }

        /* Content Area */
        .content-area {
            padding: 30px;
            min-height: 400px;
        }

        .duty-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .duty-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            border-left: 6px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease forwards;
        }

        .role-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 15px;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        /* Role Specific Colors */
        .tag-chief { background: #e0dcfc; color: var(--chief-color); border: 1px solid var(--chief-color); }
        .tag-invig { background: #dff9f3; color: var(--invig-color); border: 1px solid var(--invig-color); }
        .tag-both { background: #fff4e0; color: #d39e00; border: 1px solid var(--both-color); }

        .line-chief { border-left-color: var(--chief-color) !important; }
        .line-invig { border-left-color: var(--invig-color) !important; }
        .line-both { border-left-color: var(--both-color) !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instruction {
            font-style: italic;
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="simulation-container">
    <div class="header">
        <h2 style="margin:0">Exam Day Timeline</h2>
        <p style="margin:5px 0 0; opacity:0.8">Click a phase to explore responsibilities</p>
    </div>

    <div class="timeline-nav">
        <button class="stage-btn active" onclick="showStage('prep', this)">1. Preparation</button>
        <button class="stage-btn" onclick="showStage('start', this)">2. Exam Start</button>
        <button class="stage-btn" onclick="showStage('during', this)">3. During Writing</button>
        <button class="stage-btn" onclick="showStage('end', this)">4. Conclusion</button>
    </div>

    <div class="content-area">
        <p class="instruction" id="stage-desc">Duties performed at least 48 hours before the session starts.</p>
        <div class="duty-grid" id="duty-list">
            <!-- Content injected here -->
        </div>
    </div>
</div>

<script>
    const timelineData = {
        prep: {
            desc: "Setting the stage for a successful session.",
            items: [
                { role: "Chief Invigilator", text: "Ensure the examination venue is prepared at least two days before.", type: "chief" },
                { role: "Chief Invigilator", text: "Ensure seating plans are displayed inside and outside the room.", type: "chief" },
                { role: "Chief Invigilator", text: "Confirm candidate-to-invigilator ratio (1:30) is maintained.", type: "chief" }
            ]
        },
        start: {
            desc: "The critical moments before 'Start Writing' is announced.",
            items: [
                { role: "Chief Invigilator", text: "Retrieve sealed session bags using the GLAM key procedure.", type: "chief" },
                { role: "Invigilator", text: "Check candidate proof of identity and Admission Letters.", type: "invigilator" },
                { role: "Chief Invigilator", text: "Open sealed paper bags in front of candidates and the Principal.", type: "chief" },
                { role: "Both", text: "Wear a name tag at all times.", type: "both" }
            ]
        },
        during: {
            desc: "Maintaining integrity while the exam is in progress.",
            items: [
                { role: "Invigilator", text: "Move continuously around the venue to supervise learners.", type: "invigilator" },
                { role: "Invigilator", text: "Escort candidates to the bathroom when necessary.", type: "invigilator" },
                { role: "Invigilator", text: "Confiscate unauthorised devices and mark scripts as IRREGULARITY.", type: "invigilator" },
                { role: "Invigilator", text: "Mark learners as Present or Absent on the Script Control Register.", type: "invigilator" }
            ]
        },
        end: {
            desc: "Wrapping up and securing the answer scripts.",
            items: [
                { role: "Invigilator", text: "Count all answer books before and after use.", type: "invigilator" },
                { role: "Invigilator", text: "Ensure no answer books remain in the venue after the session.", type: "invigilator" },
                { role: "Both", text: "Batch and package answer scripts after each session.", type: "both" },
                { role: "Chief Invigilator", text: "Submit irregularity reports (Annexure A) to the WCED Unit.", type: "chief" }
            ]
        }
    };

    function showStage(stageKey, btn) {
        // Update Buttons
        document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const container = document.getElementById('duty-list');
        const desc = document.getElementById('stage-desc');
        
        container.innerHTML = '';
        desc.innerText = timelineData[stageKey].desc;

        timelineData[stageKey].items.forEach(item => {
            const div = document.createElement('div');
            div.className = `duty-item line-${item.type}`;
            div.innerHTML = `
                <span class="role-tag tag-${item.type}">${item.role}</span>
                <span>${item.text}</span>
            `;
            container.appendChild(div);
        });
    }

    // Load first stage
    showStage('prep', document.querySelector('.stage-btn'));
</script>

</body>
</html>
