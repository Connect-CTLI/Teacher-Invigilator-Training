<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Examination Sorting Activity</title>
    <style>
        :root {
            --brand-main: #001489;
            --brand-secondary: #007DBA;
            --brand-accent: #8fad15;
            --error-red: #d32f2f;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--brand-secondary);
            background-image: linear-gradient(135deg, var(--brand-secondary) 0%, #005a87 100%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            padding: 40px 15px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h1 {
            color: var(--brand-main);
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .instruction {
            text-align: center;
            font-style: italic;
            color: #5d6d7e;
            margin-bottom: 35px;
            font-size: 1.1rem;
            border-bottom: 2px solid #f0f3f4;
            padding-bottom: 20px;
        }

        #sortable-list {
            list-style: none;
            padding: 0;
        }

        .sortable-item {
            background: #ffffff;
            border: 2px solid #ebedef;
            border-left: 8px solid var(--brand-main);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 10px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .sortable-item:hover {
            border-color: var(--brand-main);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,20,137,0.15);
        }

        .sortable-item.dragging {
            opacity: 0.2;
            transform: scale(0.95);
        }

        .step-title {
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
            color: var(--brand-main);
            font-size: 1.15rem;
        }

        .step-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
            margin: 0;
        }

        .controls {
            margin-top: 40px;
            text-align: center;
        }

        button {
            background-color: var(--brand-main);
            color: #ffffff;
            border: none;
            padding: 16px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: var(--brand-accent);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(143,173,21,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #feedback {
            margin-top: 30px;
            font-weight: 800;
            font-size: 1.3rem;
            min-height: 2rem;
            transition: all 0.3s ease;
        }

        .correct { 
            color: var(--brand-accent);
            text-shadow: 0px 0px 1px rgba(0,0,0,0.1);
        }
        
        .incorrect { color: var(--error-red); }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.4rem; }
            .step-title { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sort the Pre-Examination Steps</h1>
    <p class="instruction">Learners: Drag the blocks into the correct chronological order from top to bottom.</p>

    <ul id="sortable-list"></ul>

    <div class="controls">
        <button onclick="checkOrder()">Validate Sequence</button>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const stepsData = [
        { title: "2 days before: Prepare the Examination Venue", desc: "Ensure the venue is clean, well-lit, well-ventilated, and free from disruptions. Arrange desks at least 1 meter apart. Remove all learning materials, posters and subject-related content from walls and boards. Switch off any intercom or public address system." },
        { title: "Before the exam: Prepare the Seating Plan and Display It", desc: "Prepare a unique seating plan for each session using the snaking method. Paste examination numbers — not names — on each desk. Display the seating plan inside and outside the examination room." },
        { title: "1 hour before: Retrieve the Session Bag and Brief Invigilators", desc: "Retrieve the sealed session bag following the SmartLock key procedure. Verify the correct subject and session. Confirm all documents and materials are ready. Ensure sufficient invigilators are present (ratio 1:30) and brief them on their roles and responsibilities." },
        { title: "35 min before: Admit Candidates and Search for Prohibited Items", desc: "Allow candidates to enter 35 minutes before the examination. Station an invigilator at the entrance to check IDs and admission letters. Ensure all candidates perform a self-search. Remove all unauthorised materials — phones, smart watches, notes, textbooks, Bluetooth devices. Bags must not enter the venue." },
        { title: "25 min before: Issue Answer Books and Complete Cover Pages", desc: "Issue answer books individually 25 minutes before the start. Record the number issued. Verify that all candidates complete the 5-point check: barcoded sticker, examination number, date, subject code and subject name. Confirm cover pages are fully and correctly completed." },
        { title: "Before writing: Verify, Open and Distribute Question Papers", desc: "Have two candidates verify the sealed inner bags. Open the question paper bags in front of the candidates and the principal or centre manager. Hand each candidate the correct question paper individually, placed face down. Page through all papers to check for missing pages, unclear printing or repeated sections. Read and record any errata on the board and add extra time to compensate." },
        { title: "10 min before: Read the Examination Rules Aloud", desc: "Begin reading time 10 minutes before writing starts. Candidates may read the question paper only — no writing is permitted. Read the examination rules aloud to all candidates. Do not read the instructions of the question paper." },
        { title: "Writing begins: Instruct Candidates to Begin Writing", desc: "At the official start time, instruct candidates to turn over their question papers and begin writing. The examination session is now underway." }
    ];

    const listElement = document.getElementById('sortable-list');
    const feedback = document.getElementById('feedback');

    function init() {
        const shuffled = [...stepsData].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(step => {
            const li = document.createElement('li');
            li.className = 'sortable-item';
            li.draggable = true;
            li.innerHTML = `<span class="step-title">${step.title}</span><p class="step-desc">${step.desc}</p>`;
            
            li.addEventListener('dragstart', () => li.classList.add('dragging'));
            li.addEventListener('dragend', () => li.classList.remove('dragging'));
            listElement.appendChild(li);
        });
    }

    listElement.addEventListener('dragover', e => {
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        const afterElement = getDragAfterElement(listElement, e.clientY);
        if (afterElement == null) {
            listElement.appendChild(dragging);
        } else {
            listElement.insertBefore(dragging, afterElement);
        }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.sortable-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function checkOrder() {
        const currentTitles = [...listElement.querySelectorAll('.step-title')].map(s => s.textContent);
        const correctTitles = stepsData.map(s => s.title);
        
        if (JSON.stringify(currentTitles) === JSON.stringify(correctTitles)) {
            feedback.textContent = "✓ Excellent! The sequence is 100% correct.";
            feedback.className = "correct";
        } else {
            feedback.textContent = "✕ Not quite. Please check the timings and try again.";
            feedback.className = "incorrect";
        }
    }

    init();
</script>
</body>
</html>
